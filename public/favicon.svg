<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="pen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e2b714"/>
      <stop offset="100%" style="stop-color:#f0d060"/>
    </linearGradient>
    <linearGradient id="spark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Journal page -->
  <rect x="30" y="24" width="58" height="76" rx="4" fill="#f5f5f4" opacity="0.95"/>
  <rect x="30" y="24" width="58" height="76" rx="4" fill="none" stroke="#d4d4d4" stroke-width="1"/>
  <!-- Page lines -->
  <line x1="40" y1="42" x2="78" y2="42" stroke="#d4d4d4" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40" y1="52" x2="74" y2="52" stroke="#d4d4d4" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40" y1="62" x2="70" y2="62" stroke="#d4d4d4" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40" y1="72" x2="66" y2="72" stroke="#d4d4d4" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40" y1="82" x2="60" y2="82" stroke="#d4d4d4" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Pen nib writing -->
  <g transform="translate(68, 58) rotate(35)">
    <path d="M0,0 L6,-28 L12,0 Z" fill="url(#pen)"/>
    <path d="M4,0 L6,6 L8,0 Z" fill="#333"/>
  </g>
  <!-- AI sparkle (top right) -->
  <g transform="translate(96, 32)">
    <path d="M0,-12 C2,-4 4,-2 12,0 C4,2 2,4 0,12 C-2,4 -4,2 -12,0 C-4,-2 -2,-4 0,-12Z" fill="url(#spark)"/>
  </g>
  <!-- Small sparkle -->
  <g transform="translate(86, 56)">
    <path d="M0,-6 C1,-2 2,-1 6,0 C2,1 1,2 0,6 C-1,2 -2,1 -6,0 C-2,-1 -1,-2 0,-6Z" fill="#a78bfa" opacity="0.7"/>
  </g>
  <!-- Tiny sparkle -->
  <g transform="translate(100, 50)">
    <path d="M0,-4 C0.7,-1.3 1.3,-0.7 4,0 C1.3,0.7 0.7,1.3 0,4 C-0.7,1.3 -1.3,0.7 -4,0 C-1.3,-0.7 -0.7,-1.3 0,-4Z" fill="#c4b5fd" opacity="0.5"/>
  </g>
</svg>
